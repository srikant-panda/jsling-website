<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
    <linearGradient id="jsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7df1e"/>
      <stop offset="100%" style="stop-color:#f0c800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Subtle border -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="none" stroke="#e94560" stroke-width="2" opacity="0.3"/>

  <!-- Terminal window frame -->
  <rect x="32" y="44" width="192" height="168" rx="16" ry="16" fill="#0f0f23" opacity="0.8"/>

  <!-- Terminal title bar -->
  <rect x="32" y="44" width="192" height="32" rx="16" ry="16" fill="#1e1e3a"/>
  <rect x="32" y="60" width="192" height="16" fill="#1e1e3a"/>

  <!-- Window dots -->
  <circle cx="52" cy="60" r="5" fill="#ff5f57"/>
  <circle cx="70" cy="60" r="5" fill="#febc2e"/>
  <circle cx="88" cy="60" r="5" fill="#28c840"/>

  <!-- Terminal prompt > -->
  <text x="48" y="112" font-family="monospace, Courier" font-size="28" font-weight="bold" fill="#e94560" filter="url(#glow)">&gt;_</text>

  <!-- JS text -->
  <text x="118" y="180" font-family="Arial Black, Arial, sans-serif" font-size="80" font-weight="900" fill="url(#jsGrad)" filter="url(#glow)" letter-spacing="-4">JS</text>

  <!-- Cursor blink line -->
  <rect x="48" y="120" width="24" height="3" rx="1" fill="#e94560" opacity="0.8"/>
</svg>
